<!DOCTYPE html>
<html>
<head>
<title>QuickMart Express</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{margin:0;font-family:sans-serif;background:#f7f7f7}

/* Top bar */
.top{
  background:#ffe500;
  padding:10px;
  position:sticky;
  top:0;
}

.search{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
}

/* Categories */
.cats{
  display:flex;
  overflow:auto;
  gap:10px;
  padding:10px;
}

.cat{
  background:white;
  padding:10px;
  border-radius:10px;
  min-width:90px;
  text-align:center;
  cursor:pointer;
}

/* Products */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card{
  background:white;
  padding:10px;
  border-radius:10px;
}

.card img{
  width:100%;
  border-radius:10px;
}

button{
  background:#00b300;
  color:white;
  border:none;
  padding:8px;
  width:100%;
  margin-top:5px;
}

/* Cart bar */
.cartbar{
  position:fixed;
  bottom:0;
  width:100%;
  background:black;
  color:white;
  display:flex;
  justify-content:space-between;
  padding:10px;
}
</style>

</head>

<body>

<!-- Top -->
<div class="top">
  <input id="search" class="search" placeholder="Search products..." onkeyup="filter()">
</div>

<!-- Categories -->
<div class="cats">
  <div class="cat" onclick="show('all')">All</div>
  <div class="cat" onclick="show('fruit')">Fruits</div>
  <div class="cat" onclick="show('drink')">Drinks</div>
</div>

<!-- Products -->
<div class="grid" id="grid"></div>

<!-- Cart -->
<div class="cartbar">
  <span id="count">0 items</span>
  <span>₹<span id="total">0</span></span>
  <button onclick="order()">Order</button>
</div>

<script>
let products=[
{name:"Apple",price:120,cat:"fruit",img:"https://via.placeholder.com/150"},
{name:"Banana",price:40,cat:"fruit",img:"https://via.placeholder.com/150"},
{name:"Milk",price:50,cat:"drink",img:"https://via.placeholder.com/150"},
{name:"Juice",price:80,cat:"drink",img:"https://via.placeholder.com/150"}
];

let cart=[];
let total=0;

function load(list){
let html="";
list.forEach(p=>{
html+=`
<div class="card">
<img src="${p.img}">
<h4>${p.name}</h4>
<p>₹${p.price}</p>
<button onclick="add('${p.name}',${p.price})">Add</button>
</div>`;
});
document.getElementById("grid").innerHTML=html;
}

function add(name,price){
cart.push(name);
total+=price;
document.getElementById("count").innerText=cart.length+" items";
document.getElementById("total").innerText=total;
}

function show(cat){
if(cat=="all"){load(products);return;}
let f=products.filter(p=>p.cat==cat);
load(f);
}

function filter(){
let s=document.getElementById("search").value.toLowerCase();
let f=products.filter(p=>p.name.toLowerCase().includes(s));
load(f);
}

function order(){
let msg="Order: "+cart.join(",")+" Total ₹"+total;
window.open("https://wa.me/91XXXXXXXXXX?text="+encodeURIComponent(msg));
}

load(products);
</script>

</body>
</html>
